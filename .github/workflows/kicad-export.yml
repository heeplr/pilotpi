name: KiCAD preview

on:
  push:
    paths:
      - 'power/**'
      - 'sensors/**'
      - '.github/workflows/kicad-export.yml'
  workflow_dispatch: {}

jobs:
  export-kicad:
    runs-on: ubuntu-latest

    permissions:
        contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install KiCAD
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install --yes kicad

      - name: Create output directories
        run: |
          mkdir -p power/exports
          mkdir -p sensors/exports

      - name: Export power schematic to SVG
        run: |
          cd power
          kicad-cli sch export svg --output exports power.kicad_sch

      - name: Export power board to SVG
        run: |
          cd power
          kicad-cli pcb export svg --output exports power.kicad_pcb

#      - name: Export sensors schematic to SVG
#        run: |
#          cd sensors
#          kicad-cli sch export svg --output exports sensors.kicad_sch

#      - name: Export sensors board to SVG
#        run: |
#          cd sensors
#          kicad-cli pcb export svg --output exports sensors.kicad_pcb

      - name: Generate power README with embedded SVGs
        run: |
          cat > power/README.md << 'EOF'
          # Power Board
          
          ## Schematic
          
          ![Power Schematic 1](./exports/power.svg)
          ![Power Schematic 1](./exports/power-XL4015.svg)
          
          ## PCB Layout
          
          ![Power PCB](./exports/power-pcb.svg)
          EOF

      - name: Generate sensors README with embedded SVGs
        run: |
          cat > sensors/README.md << 'EOF'
          # Sensors Board
          
          ## Schematic
          
          ![Sensors Schematic](./exports/sensors-schematic.svg)
          
          ## PCB Layout
          
          ![Sensors PCB](./exports/sensors-pcb.svg)
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update KiCAD exports and READMEs" && git push)
