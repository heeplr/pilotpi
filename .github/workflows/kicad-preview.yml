name: KiCAD preview

on:
  push:
    paths:
      - 'power/**'
      - 'sensors/**'
      - '.github/workflows/kicad-preview.yml'
  workflow_dispatch: {}

jobs:
  kicad-preview:
    runs-on: ubuntu-latest

    permissions:
        contents: read

    strategy:
      matrix:
        board:
          - name: power
            title: Power Board
          - name: sensors
            title: Sensors Board

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install KiCAD
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install --yes kicad

      - name: Create output directory
        run: |
          mkdir -p "${{matrix.board.name}}/preview"

      - name: Export schematic to SVG
        run: |
          cd "${{matrix.board.name}}"
          kicad-cli sch export svg --output preview "${{matrix.board.name}}.kicad_sch"

      - name: Export board to SVG
        run: |
          cd "${{matrix.board.name}}"
          kicad-cli pcb export svg --output "preview/${{matrix.board.name}}-front-pcb.svg" --mode-single --fit-page-to-board --layers "F.Cu,F.Silkscreen,F.Mask,Edge.Cuts" "${{matrix.board.name}}.kicad_pcb"
          kicad-cli pcb export svg --output "preview/${{matrix.board.name}}-back-pcb.svg" --mode-single --fit-page-to-board --layers "B.Cu,B.Silkscreen,B.Mask,Edge.Cuts" --mirror "${{matrix.board.name}}.kicad_pcb"
          kicad-cli pcb export svg --output "preview/${{matrix.board.name}}-front-asy.svg" --mode-single --fit-page-to-board --layers "F.Fab,Edge.Cuts" "${{matrix.board.name}}.kicad_pcb"
          kicad-cli pcb export svg --output "preview/${{matrix.board.name}}-back-asy.svg" --mode-single --fit-page-to-board --layers "B.Fab,Edge.Cuts" "${{matrix.board.name}}.kicad_pcb"

      - name: Generate README with embedded SVGs
        run: |
          python3 .github/scripts/gen-preview-readme.py "${{ matrix.board.name }}" "${{ matrix.board.title }}"

      - name: Upload preview artefacts
        uses: actions/upload-artifact@v7
        with:
          name: preview-${{ matrix.board.name }}
          path: ${{ matrix.board.name }}/
          retention-days: 1

  commit-changes:
    runs-on: ubuntu-latest
    needs: kicad-preview
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Restore artifact structure
        run: |
          # Copy artifacts back to their original locations
          for board in artifacts/preview-* ; do
            board_name="${board##*-}"
            echo "copying $board/* -> $board_name"
            cp -r "artifacts/preview-$board_name"/* "$board_name/"
          done
          rm -rf artifacts

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "autogenerated KiCAD previews" && git push)
